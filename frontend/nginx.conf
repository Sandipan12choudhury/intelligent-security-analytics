server {

    listen 80;

    server_name _;

    root /usr/share/nginx/html;

    index index.html;

    # React Router uses client-side routing - any path that isn't a
    # real file (e.g. /observations/add) must still serve index.html
    # so React Router can take over, otherwise refreshing a deep link
    # 404s.

    location / {

        try_files $uri $uri/ /index.html;

    }

    location /assets/ {

        expires 1y;

        add_header Cache-Control "public, immutable";

    }

}
