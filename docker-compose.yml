# =============================================================================
# Intelligent Security Analytics Platform - Local Docker Compose
#
# Lets you run the whole app the way a real host would, on your own
# machine, before deploying anywhere. Run from the project root:
#
#     docker compose up --build
#
# Then visit http://localhost:5173
# =============================================================================

version: "3.9"

services:

  backend:

    build:

      context: .

      dockerfile: backend/Dockerfile

    ports:

      - "8000:8000"

    env_file:

      - .env

    volumes:

      - ./dataset:/app/dataset

      - ./reports:/app/reports

      - ./database:/app/database

  frontend:

    build:

      context: .

      dockerfile: frontend/Dockerfile

      args:

        VITE_API_BASE_URL: http://localhost:8000

    ports:

      - "5173:80"

    depends_on:

      - backend
